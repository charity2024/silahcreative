<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>GSAP</title>
  <meta name="description" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="">
  <style>
    body {
      overflow: hidden;
      background: #000;
    }

    .box {
      cursor: pointer;
      border-radius: 15px;
      align-items: center;
      justify-content: center;
      display: inline-flex;
      margin: 20px;
    }

    .green {
      width: 100px;
      height: 100px;
      background: linear-gradient(#00ff00, #008000);
    }

    .purple {
      width: 100px;
      height: 100px;
      background: linear-gradient(#800080, #400040);
    }

    .orange {
      width: 100px;
      height: 100px;
      background: linear-gradient(#ffa500, #ff8c00);
    }
  </style>
</head>

<body>
  <div class="section">
    <div class="box green"></div>
    <div class="box purple"></div>
    <div class="box orange"></div>
  </div>

  <script type="module">
    import { gsap } from "https://cdn.skypack.dev/gsap";
    let tl = gsap.timeline({ repeat: -1, repeatDelay: 1, yoyo: true, ease: "power1.inOut", defaults: { duration: 2 } });

    tl.to(".green", { rotation: 360 });
    tl.to(".purple", { rotation: 360 });
    tl.to(".orange", { rotation: 360 });

  </script>

</body>

</html>

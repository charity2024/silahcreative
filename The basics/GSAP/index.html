<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>GSAP</title>
  <meta name="description" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: space-around;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    .box {
      display: block;
      border-radius: 10px;
    }

    .box.green {
      width: 100px;
      height: 100px;
      background: linear-gradient(45deg, #00ff00, #88ec88);  
    }

    .box.purple {
      width: 100px;
      height: 100px;
      background: linear-gradient(45deg, #800080, #d8bfd8);  
    }
  </style>
</head>

<body>
  <div class="box green"></div>
  <div class="box purple"></div>

  <script type="module">
    import { gsap } from "https://cdn.skypack.dev/gsap";
    gsap.to(".green", {
      rotation: 360,
      duration: 2,
      repeat: -1,
      ease: "power1.in",
      yoyo: true,
    });


    gsap.to(".purple", {
      rotation: 360,
      duration: 2,
      ease: "power1.inOut",
      yoyo: true,
      repeat: -1,
    });
  </script>

</body>

</html>

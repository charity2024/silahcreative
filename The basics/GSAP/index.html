<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>GSAP</title>
  <meta name="description" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="">
  <style>
    body {
      overflow: hidden;
      background: #000;
    }

    .section {
      display: flex;
      align-items: center;
      justify-content: space-around;
      flex-direction: row;
      height: 100vh;
    }

    .box {
      cursor: pointer;
      opacity: 0;
      border-radius: 15px;
    }

    .green {
      width: 100px;
      height: 100px;
      background: linear-gradient(#00ff00, #008000);
    }

    .purple {
      width: 100px;
      height: 100px;
      background: linear-gradient(#800080, #400040);
    }

    .orange {
      width: 100px;
      height: 100px;
      background: linear-gradient(#ffa500, #ff8c00);
    }

    .text {
      position: fixed;
      bottom: 2rem;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: azure;
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }

    .braces {
      display: block;
    }
  </style>
</head>

<body>
  <div class="section">
    <div class="box green"></div>
    <div class="box purple"></div>
    <div class="box orange"></div>
    <div class="box purple"></div>
    <div class="box green"></div>
  </div>
  <div class="text">
    <h4 class="braces">click a box to stagger out</h4>
  </div>

  <script type="module">
    import { gsap } from "https://cdn.skypack.dev/gsap";
    gsap.to(".box", {
      duration: 1,
      rotation: 360,
      opacity: 1,
      delay: 0.5,
      stagger: {
        ease:"none",
      }, 
    });

    document.querySelectorAll(".box").forEach((box, index) => {
      box.addEventListener("click", () => {
        gsap.to(".box", {
          duration: 0.5,
          opacity: 0,
          y: -100,
          stagger: {
            from: index, // stagger in from the clicked element's index
            amount: 1 // spread the entire stagger out over 1 second
          },
          ease: "back.in",
          overwrite: "auto"
        });
      });
    });
  </script>

</body>

</html>

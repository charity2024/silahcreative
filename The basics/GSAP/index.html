<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>GSAP</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="">
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      .box {
        display: block;
        width: 100px;
        height: 100px;
        border-radius: 10%;
      }
    </style>
  </head>
  <body>
    <main class="box"></main>
    <script type="module">
      import { gsap } from "https://cdn.skypack.dev/gsap";
      gsap.to(".box", { 
        x: 300,
        y:100,
        duration: 2,
        rotation: 360,
        yPercent: 50,
        repeat: -1,
        yoyo: true,
        backgroundColor: '#9d95ff',

      });
    </script>

  </body>
</html>
